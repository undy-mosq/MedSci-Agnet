# PubMed 文献分析 Demo — 模式 B：Nginx 同域反代
# 将下方 root 改为本机 frontend/dist 的绝对路径（Windows 建议用正斜杠）。
# 用法见 deploy/README.md

upstream pubmed_api {
    server 127.0.0.1:8000;
}

server {
    listen 8080;
    server_name localhost;

    # 示例：D:/13056/web_demo/frontend/dist
    root D:/13056/web_demo/frontend/dist;
    index index.html;

    client_max_body_size 4m;

    location /api/ {
        proxy_pass http://pubmed_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    location = /health {
        proxy_pass http://pubmed_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
